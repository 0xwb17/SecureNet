<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureNet - Wireless Authentication</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════════════
           CSS RESET & VARIABLES
        ═══════════════════════════════════════════════════ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0c12;
            --bg-card: #14161f;
            --bg-input: #0e1018;
            --border: rgba(255, 255, 255, 0.06);
            --border-focus: #6c5ce7;
            --text-primary: #e8eaf0;
            --text-secondary: #8b8fa3;
            --text-muted: #555970;
            --accent: #6c5ce7;
            --accent-hover: #7c6ef0;
            --accent-glow: rgba(108, 92, 231, 0.2);
            --accent-subtle: rgba(108, 92, 231, 0.06);
            --danger: #e74c5e;
            --danger-bg: rgba(231, 76, 94, 0.08);
            --danger-border: rgba(231, 76, 94, 0.2);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            font-size: 15px;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ═══════════════════════════════════════════════════
           BACKGROUND ATMOSPHERE
        ═══════════════════════════════════════════════════ */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(108, 92, 231, 0.06) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -15%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(46, 204, 113, 0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle grid pattern */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ═══════════════════════════════════════════════════
           LOGIN CONTAINER
        ═══════════════════════════════════════════════════ */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ═══════════════════════════════════════════════════
           CARD HEADER
        ═══════════════════════════════════════════════════ */
        .card-header {
            padding: 36px 32px 0;
            text-align: center;
        }

        .brand-lock {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: var(--radius-md);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.25);
        }

        .brand-lock .material-icons-round {
            font-size: 26px;
            color: #fff;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ═══════════════════════════════════════════════════
           CARD BODY
        ═══════════════════════════════════════════════════ */
        .card-body {
            padding: 28px 32px 32px;
        }

        /* ═══════════════════════════════════════════════════
           ERROR MESSAGE
        ═══════════════════════════════════════════════════ */
        .error {
            padding: 12px 14px;
            margin-bottom: 20px;
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger-border);
            border-radius: var(--radius-sm);
            font-size: 0.84rem;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shakeIn 0.35s ease-out;
        }

        .error .material-icons-round {
            font-size: 20px;
            flex-shrink: 0;
        }

        @keyframes shakeIn {
            0% { transform: translateX(-6px); opacity: 0; }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-3px); }
            75% { transform: translateX(2px); }
            100% { transform: translateX(0); opacity: 1; }
        }

        /* ═══════════════════════════════════════════════════
           FORM
        ═══════════════════════════════════════════════════ */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 7px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .form-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* ═══════════════════════════════════════════════════
           BUTTON
        ═══════════════════════════════════════════════════ */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            margin-top: 6px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
            letter-spacing: 0.01em;
        }

        .btn .material-icons-round {
            font-size: 20px;
        }

        .btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.35);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(108, 92, 231, 0.2);
        }

        /* ═══════════════════════════════════════════════════
           FOOTER NOTE
        ═══════════════════════════════════════════════════ */
        .security-note {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .security-note p {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .security-note .material-icons-round {
            font-size: 14px;
            opacity: 0.6;
        }

        /* ═══════════════════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════════════════ */
        @media (max-width: 480px) {
            .login-wrapper {
                padding: 16px;
            }
            .card-header {
                padding: 28px 24px 0;
            }
            .card-body {
                padding: 24px;
            }
            .brand-name {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="card-header">
                <div class="brand-lock">
                    <span class="material-icons-round">lock</span>
                </div>
                <div class="brand-name">SecureNet</div>
                <div class="brand-subtitle">Network Authentication Required</div>
            </div>

            <div class="card-body">

                <!-- Error Message Box (Manipulated by Python) -->
                <div class="error" id="error-box">
                    <span class="material-icons-round">error_outline</span>
                    {{ error }}
                </div>

                <form action="/login" method="POST">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-input" placeholder="Enter your username" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn">
                        <span class="material-icons-round">login</span>
                        Connect
                    </button>
                </form>

                <div class="security-note">
                    <p>
                        <span class="material-icons-round">verified_user</span>
                        Traffic is monitored and logged. Unauthorized access attempts are recorded.
                    </p>
                </div>

            </div>
        </div>
    </div>

    <!-- Tiny Javascript to show the error box if Python sends an error -->
    <script>
        let errorMsg = "{{ error }}";
        if(errorMsg.trim() !== "") {
            document.getElementById('error-box').style.display = 'flex';
        }
    </script>

</body>
</html>
